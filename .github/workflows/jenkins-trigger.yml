name: Trigger Internal Jenkins

on: [push, pull_request]

jobs:
  ping-jenkins:
    runs-on: self-hosted  # Runs on your internal Ubuntu 24.04 container
    
    # Inject the GitHub Secrets/Variables as Environment Variables
    env:
      JENKINS_URL: ${{ secrets.JENKINS_URL }}
      JENKINS_USER: ${{ secrets.JENKINS_USER }}
      JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}

    steps:
      - name: Trigger Jenkins Pipeline
        run: |
          # The curl command now uses the environment variables securely
          curl -I -X POST "${JENKINS_URL}/job/${{ github.event.repository.name }}/build?delay=0sec" \
               --user "${JENKINS_USER}:${JENKINS_TOKEN}"
